services:

  init-sysctl:
    image: busybox
    container_name: scylla-init-sysctl
    privileged: true
    command: ["sh", "-c", "sysctl -w fs.aio-max-nr=1048576"]

  scylla1:
    image: scylladb/scylla:2026.1.5
    container_name: scylla1
    ports:
      - "127.0.0.1:9042:9042"
    volumes:
      - scylla1_data:/var/lib/scylla
    restart: always
    command: --smp 1 --memory 1G --overprovisioned 1 --developer-mode 1 --seeds scylla1 --broadcast-rpc-address 127.0.0.1
    depends_on:
      init-sysctl:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      start_period: 60s
      interval: 10s
      timeout: 5s
      retries: 6

  scylla2:
    image: scylladb/scylla:2026.1.5
    container_name: scylla2
    ports:
      - "127.0.0.2:9042:9042"
    volumes:
      - scylla2_data:/var/lib/scylla
    restart: always
    command: --smp 1 --memory 1G --overprovisioned 1 --developer-mode 1 --seeds scylla1 --broadcast-rpc-address 127.0.0.2
    depends_on:
      scylla1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      start_period: 60s
      interval: 10s
      timeout: 5s
      retries: 6

  scylla3:
    image: scylladb/scylla:2026.1.5
    container_name: scylla3
    ports:
      - "127.0.0.3:9042:9042"
    volumes:
      - scylla3_data:/var/lib/scylla
    restart: always
    command: --smp 1 --memory 1G --overprovisioned 1 --developer-mode 1 --seeds scylla1 --broadcast-rpc-address 127.0.0.3
    depends_on:
      scylla2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      start_period: 60s
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  scylla1_data:
    driver: local
  scylla2_data:
    driver: local
  scylla3_data:
    driver: local
